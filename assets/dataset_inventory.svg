<svg xmlns="http://www.w3.org/2000/svg" width="820" height="460" viewBox="0 0 820 460" role="img" aria-labelledby="title desc">
  <title id="title">Formula 1 Dataset Inventory</title>
  <desc id="desc">Dataset inventory showing row counts for core Formula 1 tables.</desc>
  <rect width="820" height="460" fill="#f8fafc"/>
  <text x="40" y="55" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#111827">Dataset Inventory</text>
  <text x="40" y="85" font-family="Arial, sans-serif" font-size="14" fill="#4b5563">Core tables prepared for Formula 1 dashboard modelling</text>
  <text x="40" y="135" font-family="Arial" font-size="14" fill="#111827">Driver standings</text><rect x="205" y="116" width="500" height="26" fill="#2563eb" rx="4"/><text x="720" y="135" font-family="Arial" font-size="13" fill="#111827">35,405</text>
  <text x="40" y="175" font-family="Arial" font-size="14" fill="#111827">Results</text><rect x="205" y="156" width="385" height="26" fill="#0f766e" rx="4"/><text x="720" y="175" font-family="Arial" font-size="13" fill="#111827">27,282</text>
  <text x="40" y="215" font-family="Arial" font-size="14" fill="#111827">Pit stops</text><rect x="205" y="196" width="313" height="26" fill="#7c3aed" rx="4"/><text x="720" y="215" font-family="Arial" font-size="13" fill="#111827">22,164</text>
  <text x="40" y="255" font-family="Arial" font-size="14" fill="#111827">Constructor standings</text><rect x="205" y="236" width="193" height="26" fill="#f59e0b" rx="4"/><text x="720" y="255" font-family="Arial" font-size="13" fill="#111827">13,653</text>
  <text x="40" y="295" font-family="Arial" font-size="14" fill="#111827">Qualifying</text><rect x="205" y="276" width="155" height="26" fill="#0891b2" rx="4"/><text x="720" y="295" font-family="Arial" font-size="13" fill="#111827">11,014</text>
  <text x="40" y="335" font-family="Arial" font-size="14" fill="#111827">Races</text><rect x="205" y="316" width="17" height="26" fill="#dc2626" rx="4"/><text x="720" y="335" font-family="Arial" font-size="13" fill="#111827">1,171</text>
  <text x="40" y="405" font-family="Arial, sans-serif" font-size="12" fill="#6b7280">Inventory supports the current Power BI modelling direction.</text>
</svg>
